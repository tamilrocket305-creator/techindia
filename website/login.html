<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TECHINDIA PROJECT CENTER</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo">
                <i class="fas fa-microchip"></i>
                <h1>TECHINDIA PROJECT CENTER</h1>
            </a>
        </div>

        <div class="auth-box">
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Create Account</button>
            </div>

            <!-- Login Form -->
            <form class="auth-form active" id="loginForm">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <p class="auth-link">Don't have an account? <a href="#" data-tab="register">Create one</a></p>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="registerForm">
                <h2>Create New Account</h2>
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="registerName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="registerEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-phone"></i> Mobile Number</label>
                    <input type="tel" id="registerMobile" pattern="[0-9]{10}" required placeholder="Enter 10 digit mobile number">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="registerPassword" required placeholder="Create a password" minlength="6">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <p class="auth-link">Already have an account? <a href="#" data-tab="login">Login here</a></p>
            </form>
        </div>

        <div class="auth-footer">
            <p>&copy; 2026 TECHINDIA PROJECT CENTER</p>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
