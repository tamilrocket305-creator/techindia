<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - TECHINDIA PROJECT CENTER</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-logo">
            <i class="fas fa-microchip"></i>
            <h2>TECHINDIA</h2>
        </div>
        <nav class="admin-nav">
            <a href="dashboard.html">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="projects.html">
                <i class="fas fa-project-diagram"></i> Manage Projects
            </a>
            <a href="orders.html" class="active">
                <i class="fas fa-shopping-cart"></i> Orders
            </a>
            <a href="../index.html" target="_blank">
                <i class="fas fa-external-link-alt"></i> View Website
            </a>
            <a href="#" id="adminLogout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Manage Orders</h1>
            <div class="filter-group">
                <select id="statusFilter">
                    <option value="all">All Orders</option>
                    <option value="pending">Pending</option>
                    <option value="accepted">Accepted</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
        </header>

        <!-- Orders Table -->
        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Project</th>
                        <th>Contact</th>
                        <th>Order Code</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Order Details Modal -->
    <div class="modal" id="orderModal">
        <div class="modal-content modal-large">
            <span class="close-modal">&times;</span>
            <h2>Order Details</h2>
            <div class="order-details-content">
                <div class="order-info-grid">
                    <div class="info-item">
                        <label>Order ID:</label>
                        <span id="detailOrderId"></span>
                    </div>
                    <div class="info-item">
                        <label>Order Code:</label>
                        <span id="detailOrderCode"></span>
                    </div>
                    <div class="info-item">
                        <label>Order Date:</label>
                        <span id="detailOrderDate"></span>
                    </div>
                    <div class="info-item">
                        <label>Customer Name:</label>
                        <span id="detailName"></span>
                    </div>
                    <div class="info-item">
                        <label>Mobile:</label>
                        <span id="detailMobile"></span>
                    </div>
                    <div class="info-item">
                        <label>Email:</label>
                        <span id="detailEmail"></span>
                    </div>
                    <div class="info-item full-width">
                        <label>Address:</label>
                        <span id="detailAddress"></span>
                    </div>
                    <div class="info-item">
                        <label>Pin Code:</label>
                        <span id="detailPincode"></span>
                    </div>
                    <div class="info-item">
                        <label>Project:</label>
                        <span id="detailProject"></span>
                    </div>
                </div>
                
                <div class="order-status-update">
                    <h3>Update Order Status</h3>
                    <input type="hidden" id="updateOrderId">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="updateStatus">
                            <option value="pending">Pending</option>
                            <option value="accepted">Accepted</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status Note</label>
                        <textarea id="updateNote" rows="3" placeholder="Add a note about the order status..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary close-modal-btn">Close</button>
                        <button type="button" class="btn-primary" id="updateOrderBtn">Update Status</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
