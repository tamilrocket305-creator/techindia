<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Projects - TECHINDIA PROJECT CENTER</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-body">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
        <div class="admin-logo">
            <i class="fas fa-microchip"></i>
            <h2>TECHINDIA</h2>
        </div>
        <nav class="admin-nav">
            <a href="dashboard.html">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </a>
            <a href="projects.html" class="active">
                <i class="fas fa-project-diagram"></i> Manage Projects
            </a>
            <a href="orders.html">
                <i class="fas fa-shopping-cart"></i> Orders
            </a>
            <a href="../index.html" target="_blank">
                <i class="fas fa-external-link-alt"></i> View Website
            </a>
            <a href="#" id="adminLogout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <h1>Manage Projects</h1>
            <button class="btn-add" id="addProjectBtn">
                <i class="fas fa-plus"></i> Add New Project
            </button>
        </header>

        <!-- Projects Table -->
        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTable">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add/Edit Project Modal -->
    <div class="modal" id="projectModal">
        <div class="modal-content modal-large">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Add New Project</h2>
            <form id="projectForm">
                <input type="hidden" id="projectId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Project Title *</label>
                        <input type="text" id="projectTitle" required>
                    </div>
                    <div class="form-group">
                        <label>Category *</label>
                        <select id="projectCategory" required>
                            <option value="">Select Category</option>
                            <option value="mini">Mini Project</option>
                            <option value="be">BE Project</option>
                            <option value="science">Science Project</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Department *</label>
                        <select id="projectDepartment" required>
                            <option value="">Select Department</option>
                            <option value="cse">CSE/IT</option>
                            <option value="ece">ECE</option>
                            <option value="eee">EEE</option>
                            <option value="mechanical">Mechanical</option>
                            <option value="civil">Civil</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="projectStatus">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Description *</label>
                    <input type="text" id="projectShortDesc" required placeholder="Brief one-line description">
                </div>
                <div class="form-group">
                    <label>Full Description *</label>
                    <textarea id="projectDescription" rows="4" required placeholder="Detailed project description"></textarea>
                </div>
                <div class="form-group">
                    <label>Technologies/Features (comma separated)</label>
                    <input type="text" id="projectFeatures" placeholder="e.g., IoT, Arduino, Sensors, Mobile App">
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="projectPrice" placeholder="Enter price">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelProject">Cancel</button>
                    <button type="submit" class="btn-primary">Save Project</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/admin.js"></script>
</body>
</html>
